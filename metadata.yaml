# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: hashicorp-boundary-remove-user-from-group
description: Remove a user from a group in HashiCorp Boundary

# Input parameters for web form generation
inputs:
  groupId:
    type: text
    description: The Boundary group ID to remove user from
    required: true
    validation:
      min: 1
      max: 200

  userId:
    type: text
    description: The Boundary user ID to remove from group
    required: true
    validation:
      min: 1
      max: 200

  authMethodId:
    type: text
    description: The Boundary auth method ID for authentication
    required: true
    validation:
      min: 1
      max: 200

  address:
    type: text
    description: Boundary controller URL (overrides environment ADDRESS)
    required: false

# Expected output structure
outputs:
  groupId:
    type: text
    description: The group ID that was processed

  userId:
    type: text
    description: The user ID that was removed

  authMethodId:
    type: text
    description: The auth method ID used for authentication

  userRemoved:
    type: boolean
    description: Whether the user was successfully removed from group

  removedAt:
    type: datetime
    description: When the operation completed (ISO 8601)

# Required secrets (configured at deployment time)
secrets:
  BASIC_USERNAME:
    type: text
    description: Boundary auth method login name
    required: true
  BASIC_PASSWORD:
    type: text
    description: Boundary auth method password
    required: true

environment:
  ADDRESS:
    type: text
    description: Boundary controller URL
    required: false

# Runtime configuration
runtime:
  type: nodejs-22
  timeout: 30s
  memory: 128Mi
